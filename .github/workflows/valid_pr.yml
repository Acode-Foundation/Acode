name: PR Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Biome check
        run: npx biome check src/lib/editorManager.js src/settings/editorSettings.js src/lib/snippets.js src/lib/settings.js

      - name: Typecheck
        run: npm run typecheck

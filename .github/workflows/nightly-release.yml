name: Nightly Release

on:
  schedule:
    # Fire every day at 7:00am UTC (Roughly before EU workday and after US workday)
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    uses: unschooledgamer/acode/.github/workflows/nightly-build.yml@fix/on-demand-previews
    permissions:
      contents: read
      pull-requests: read
    secrets:
      KEYSTORE_CONTENT: ${{ secrets.KEYSTORE_CONTENT }}
      BUILD_JSON_CONTENT: ${{ secrets.BUILD_JSON_CONTENT }}
    with:
      is_PR: false
      is_trusted_pr: false

  release:
    needs: build
    runs-on: ubuntu-latest
    # if: ${{ github.repository_owner == 'Acode-Foundation' && needs.build.result == 'success' }}
    permissions:
      contents: write
      id-token: write

    outputs:
      release_output_url: ${{ steps.gh_release.outputs.url }}
      release_notes: ${{ env.RELEASE_NOTES }}
      previous_tag_commit: ${{ steps.prev_tag.outputs.tag_commit }}
      nightly_tag_name: ${{ needs.build.outputs.updated_version }}
      subjects_file: ${{ steps.subjects_file.outputs.handle }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required for tags
          persist-credentials: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Download normal APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: /tmp/artifacts/normal

      - name: Download fdroid APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-fdroid-${{ github.sha }}
          path: /tmp/artifacts/fdroid

      - name: Build SLSA subjects file
        shell: bash
        run: |
          set -euo pipefail
          find /tmp/artifacts -type f -name '*.apk' -print0 | sort -z | while IFS= read -r -d '' f; do
            sha256sum "$f"
          done > /tmp/slsa-subjects.txt

          test -s /tmp/slsa-subjects.txt || { echo "No subjects found"; exit 1; }

      - name: Create subjects file handle
        id: subjects_file
        uses: slsa-framework/slsa-github-generator/actions/generator/generic/create-base64-subjects-from-file@v2.1.0
        with:
          path: /tmp/slsa-subjects.txt

      - name: Resolve previous nightly tag commit
        id: prev
        run: |
          if git show-ref --quiet refs/tags/nightly; then
            echo "tag_commit=$(git rev-parse nightly)" >> "$GITHUB_OUTPUT"
          else
            echo "tag_commit=$(git rev-list --max-parents=0 HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Move nightly tag
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'
          git tag -f nightly "${GITHUB_SHA}"
          git push origin refs/tags/nightly --force

      - name: Generate release notes
        id: notes
        continue-on-error: true
        run: |
          RELEASE_NOTES="$(node utils/scripts/generate-release-notes.js \
            ${{ github.repository_owner }} Acode ${{ github.sha }} \
            --format md --from-tag ${{ steps.prev.outputs.tag_commit }} --important-only --quiet || true)"
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$RELEASE_NOTES"
            echo "EOF"
          } >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.NIGHTLY_RELEASE_NOTES_GH_TOKEN }}

      - name: Create nightly prerelease
        uses: softprops/action-gh-release@v3
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          prerelease: true
          tag_name: ${{ needs.build.outputs.updated_version}}
          name: ${{ needs.build.outputs.updated_version}}
          files: |
            /tmp/artifacts/normal/*.apk
            /tmp/artifacts/normal/*.apk.sha256
            /tmp/artifacts/fdroid/*.apk
            /tmp/artifacts/fdroid/*.apk.sha256
          body: |
            Automated Nightly pre-release

            [Compare Changes](https://github.com/${{ github.repository }}/compare/${{ steps.prev.outputs.tag_commit }}...${{ github.sha }})

            ${{ env.RELEASE_NOTES }}
    
  provenance:
    name: Generate SLSA provenance
    needs: [release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
       # base64 of lines in sha256sum format: "<sha256><two spaces><path-or-name>"
     base64-subjects: "${{ needs.release.outputs.hashes_b64 }}"
     upload-assets: true
     upload-tag-name: "${{ needs.release.outputs.nightly_tag_name }}"
